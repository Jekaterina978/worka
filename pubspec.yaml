name: worka
description: Worka app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.7.0
  http: ^1.2.2
  flutter_stripe: ^11.4.0
  image_picker: ^1.1.2
  provider: ^6.1.2

  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/illustration.png
    - assets/avatars/
    - assets/icons/icon_housing.png
    - assets/icons/icon_transport.png
    - assets/icons/icon_teens.png
    - assets/icons/icon_disabled.png
    # - assets/   # если хочешь подключить всю папку assets целиком
